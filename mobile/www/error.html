<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AeroTrack</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #0f172a;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        max-width: 340px;
        margin: 16px;
        padding: 24px;
        text-align: center;
      }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { font-size: 14px; color: #64748b; margin: 0 0 16px; }
      button {
        background: #2563eb;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 500;
        width: 100%;
      }
      #diag {
        margin-top: 16px;
        padding: 8px;
        background: #f1f5f9;
        border-radius: 8px;
        font-family: monospace;
        font-size: 11px;
        color: #475569;
        text-align: left;
        word-break: break-all;
        white-space: pre-wrap;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; border-color: #334155; }
        p { color: #94a3b8; }
        button { background: #3b82f6; }
        #diag { background: #334155; color: #cbd5e1; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>No se pudo cargar la aplicación</h1>
      <p>
        Revisa tu conexión a internet. Reintentando automáticamente…
      </p>
      <button onclick="retry()">Reintentar ahora</button>
      <div id="diag">Diagnosticando conexión…</div>
    </div>
    <script>
      var SITE = "https://eiv-solution-air-service-work-recor.vercel.app";
      var diag = document.getElementById("diag");
      var probing = false;
      var retryTimer = null;

      // Return to the app root, not /login: if the session cookie is still
      // valid the worker resumes where they were instead of being forced to
      // sign in again mid-shift (the app redirects to /login only if needed).
      function retry() {
        window.location.href = SITE + "/";
      }

      // Is the site reachable? This page is served from the app's local origin,
      // so a normal (CORS) fetch to the remote site is ALWAYS blocked and throws
      // "Failed to fetch" even when the server is perfectly up — a false alarm
      // that used to leave this screen stuck. `mode: "no-cors"` fixes that: it
      // resolves (opaque) whenever the server actually answers, and only rejects
      // on a real network failure. So a resolve means "reachable → reload the
      // app"; a reject means "still offline → keep retrying".
      function probe() {
        if (probing) return;
        probing = true;
        if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
        var started = Date.now();
        // Short timeout so a hung socket doesn't stall recovery.
        var ctrl = typeof AbortController !== "undefined" ? new AbortController() : null;
        var killer = ctrl ? setTimeout(function () { ctrl.abort(); }, 8000) : null;
        fetch(SITE + "/", { mode: "no-cors", cache: "no-store", signal: ctrl ? ctrl.signal : undefined })
          .then(function () {
            if (killer) clearTimeout(killer);
            probing = false;
            diag.textContent = "Conexión restablecida. Reabriendo…";
            // Server answered — go back to the app (top-level nav, no CORS).
            retry();
          })
          .catch(function (err) {
            if (killer) clearTimeout(killer);
            probing = false;
            var ms = Date.now() - started;
            diag.textContent =
              "Fallo de red tras " + ms + "ms:\n" +
              (err && err.name ? err.name + ": " : "") +
              (err && err.message ? err.message : String(err)) +
              "\n\nUserAgent:\n" + navigator.userAgent +
              "\n\nOnline: " + navigator.onLine;
            // Keep probing on a timer; recover as soon as the network does.
            retryTimer = setTimeout(probe, 5000);
          });
      }

      // Recover instantly when the OS reports the network is back or the app
      // returns to the foreground, instead of waiting for the next timer tick.
      window.addEventListener("online", probe);
      document.addEventListener("visibilitychange", function () {
        if (!document.hidden) probe();
      });

      probe();
    </script>
  </body>
</html>
