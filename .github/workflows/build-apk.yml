name: Build Android APK

on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Grant execute permission for gradlew
        working-directory: mobile/twa
        run: chmod +x gradlew

      - name: Build release APK (Trusted Web Activity)
        working-directory: mobile/twa
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: eiv-solution-air-apk
          path: mobile/twa/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Publish APK to a new GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-apk-${{ github.run_number }}
          name: EIV Solution Air - Android (TWA) - build ${{ github.run_number }}
          body: >
            Android app rendering the live site through Chrome itself
            (Trusted Web Activity) - same engine and cookies as the browser,
            so Google Sign-In works directly. Built from commit
            ${{ github.sha }}. Signed with the repo's fixed key, so future
            builds install as updates. Enable "install from unknown sources"
            on Android before opening it.
          files: mobile/twa/app/build/outputs/apk/release/app-release.apk
