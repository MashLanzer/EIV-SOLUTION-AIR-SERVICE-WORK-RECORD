name: Build Android APK

on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mobile shell dependencies
        working-directory: mobile
        run: npm install

      - name: Generate app icons and splash screen
        working-directory: mobile
        run: npx capacitor-assets generate --android

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: aerotrack-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Publish APK to a new GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-apk-${{ github.run_number }}
          name: AeroTrack - Android - build ${{ github.run_number }}
          body: >
            Fullscreen app shell wrapping the live web app; Google Sign-In
            bounces to the system browser and returns automatically. Built
            from commit ${{ github.sha }}. Signed with the repo's fixed key,
            so future builds install as updates. Enable "install from
            unknown sources" on Android before opening it.
          files: mobile/android/app/build/outputs/apk/release/app-release.apk
