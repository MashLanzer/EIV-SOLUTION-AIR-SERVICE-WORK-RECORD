name: Build Android APK

on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mobile shell dependencies
        working-directory: mobile
        run: npm install

      - name: Generate app icons and splash screen
        working-directory: mobile
        run: npx capacitor-assets generate --android

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: eiv-solution-air-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
