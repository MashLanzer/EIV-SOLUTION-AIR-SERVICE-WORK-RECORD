name: Build Android APK

on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mobile shell dependencies
        working-directory: mobile
        run: npm install

      - name: Generate app icons and splash screen
        working-directory: mobile
        run: npx capacitor-assets generate --android

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        working-directory: mobile/android
        run: chmod +x gradlew

      # Re-run trigger: rebuild for a clean reinstall after a device-side
      # WebView issue was suspected.
      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: eiv-solution-air-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Publish APK to a new GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-apk-${{ github.run_number }}
          name: EIV Solution Air - Android (debug APK) - build ${{ github.run_number }}
          body: >
            Debug APK wrapping the live web app in a native Android shell.
            Built from commit ${{ github.sha }}. Each build gets its own
            release/link (instead of overwriting one) so there's no risk of
            installing a stale, cached download. Enable "install from
            unknown sources" on Android before opening it.
          files: mobile/android/app/build/outputs/apk/debug/app-debug.apk
